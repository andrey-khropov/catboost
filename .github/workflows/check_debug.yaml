name: Check build and tests

on:
  push:
    branches:
      - debug_test_failures_2

jobs:
  check:
    name: Check per OS
    runs-on: windows-2022
    steps:
      - name: Check toolkits
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe" modify --installPath "C:\Program Files\Microsoft Visual Studio\2022\Enterprise" --add "Microsoft.VisualStudio.Component.VC.14.40.17.10.x86.x64" --norestart --nocache
          dir "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\MSVC\*"
